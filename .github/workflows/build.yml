name: build-and-push

# Builds the vanilla Terraria dedicated-server image and publishes it to GHCR
# using the built-in GITHUB_TOKEN (no PAT). Resolves the newest server zip from
# terraria.org's download listing, so scheduled runs track retail releases.
on:
  push:
    branches: [main]
    paths: [Dockerfile, entrypoint.sh, .github/workflows/build.yml]
  workflow_dispatch:
    inputs:
      terraria_version:
        description: 'Pin a version in zip form, e.g. 1456 (blank = newest)'
        required: false
  schedule:
    - cron: '0 6 * * 1'   # weekly

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/gamectl-hq/terraria-kube
  # Known-good baseline (1.4.5.6). The resolve step probes upward from here for
  # newer server zips, so this only needs a manual bump across big jumps.
  BASELINE: '1456'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Terraria version
        id: v
        run: |
          ver="${{ github.event.inputs.terraria_version }}"
          if [ -z "$ver" ]; then
            # terraria.org has no version API (the site is JS-rendered), but the
            # server zip URL 200s for every released version and version digits
            # concatenate (1.4.5.6 -> 1456). Probe upward from the baseline and
            # keep the highest zip that exists.
            ver="$BASELINE"
            for cand in $(seq "$BASELINE" $((BASELINE + 150))); do
              if curl -sfI --max-time 10 "https://terraria.org/api/download/pc-dedicated-server/terraria-server-${cand}.zip" >/dev/null; then
                ver="$cand"
              fi
            done
          fi
          # Final existence check (also validates a manually-pinned input).
          curl -sfI --max-time 15 "https://terraria.org/api/download/pc-dedicated-server/terraria-server-${ver}.zip" >/dev/null \
            || { echo "server zip for $ver not found" >&2; exit 1; }
          # dotted form for the tag: 1456 -> 1.4.5.6
          dotted="$(echo "$ver" | sed 's/./&./g;s/\.$//')"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          echo "dotted=$dotted" >> "$GITHUB_OUTPUT"
          echo "Building Terraria $dotted (zip $ver)"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            TERRARIA_VERSION=${{ steps.v.outputs.ver }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.v.outputs.dotted }}
          labels: |
            org.opencontainers.image.source=https://github.com/GameCTL-HQ/Terraria-Kube
            org.opencontainers.image.description=Vanilla Terraria ${{ steps.v.outputs.dotted }} dedicated server for Kubernetes (GameCTL)
