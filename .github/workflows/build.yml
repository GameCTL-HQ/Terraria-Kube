name: build-and-push

# Builds the vanilla Terraria dedicated-server image and publishes it to GHCR
# using the built-in GITHUB_TOKEN (no PAT). Resolves the newest server zip from
# terraria.org's download listing, so scheduled runs track retail releases.
on:
  push:
    branches: [main]
    paths: [Dockerfile, entrypoint.sh, .github/workflows/build.yml]
  workflow_dispatch:
    inputs:
      terraria_version:
        description: 'Pin a version in zip form, e.g. 1456 (blank = newest)'
        required: false
  schedule:
    - cron: '0 6 * * 1'   # weekly

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/gamectl-hq/terraria-kube

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Terraria version
        id: v
        run: |
          ver="${{ github.event.inputs.terraria_version }}"
          if [ -z "$ver" ]; then
            # The download page links terraria-server-<ver>.zip; take the highest.
            ver="$(curl -fsSL https://terraria.org/ | grep -oE 'terraria-server-[0-9]+\.zip' \
                   | grep -oE '[0-9]+' | sort -n | tail -1)"
          fi
          [ -n "$ver" ] || { echo "could not resolve version" >&2; exit 1; }
          # dotted form for the tag: 1456 -> 1.4.5.6
          dotted="$(echo "$ver" | sed 's/./&./g;s/\.$//')"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
          echo "dotted=$dotted" >> "$GITHUB_OUTPUT"
          echo "Building Terraria $dotted (zip $ver)"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            TERRARIA_VERSION=${{ steps.v.outputs.ver }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.v.outputs.dotted }}
          labels: |
            org.opencontainers.image.source=https://github.com/GameCTL-HQ/Terraria-Kube
            org.opencontainers.image.description=Vanilla Terraria ${{ steps.v.outputs.dotted }} dedicated server for Kubernetes (GameCTL)
